<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile-My Virtual Profile Card</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="profile-box">
      <div class="menu">
        <img src="./assets/menu (1).png" alt="menu" width="25px" />
        <img src="./assets//setting (1).png" alt="setting" width="25px" />
      </div>

      <div class="container">
        <img
          src="./assets//download (2).png"
          alt="profile"
          class="profile-pic"
        />
        <div class="text">
          <h3>Learner Beaver</h3>
          <p>Frontend Dev at CrioDo, Bengaluru</p>
        </div>

        <div class="social-media">
          <img src="./assets//instagram (1).png" alt="insta" />
          <img src="./assets/telegram (1).png" alt="telegram" />
          <img src="./assets//dribble (1).png" alt="web" />
        </div>
      </div>
    </div>
  </body>
</html>
